<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artyva — Formulário de Diagnóstico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Inter', sans-serif; background: #111; color: #EEE; display: flex; justify-content: center; padding: 20px; margin: 0; }
  .box { max-width: 480px; width: 100%; background: #1A1A1A; padding: 35px; border-radius: 16px; border: 1px solid #333; margin-top: 40px; }
  .header { text-align: center; margin-bottom: 30px; }
  .logo-text { color: #FF3366; font-weight: 800; font-size: 24px; letter-spacing: 2px; }
  label { display: block; margin: 18px 0 6px; color: #888; font-size: 13px; }
  input, textarea, select { width: 100%; padding: 14px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
  .btn-submit { width: 100%; padding: 16px; background: #FF3366; color: white; border: none; border-radius: 8px; font-weight: 700; margin-top: 30px; cursor: pointer; transition: 0.3s; }
  .btn-submit:hover { background: #E62E5C; }
</style>
</head>
<body>

<div class="box" id="formContent">
  <div class="header">
    <div class="logo-text">ARTYVA</div>
    <h2 id="displayNome" style="margin: 10px 0 5px;">Diagnóstico de Gestão</h2>
    <p style="color:#666; font-size: 12px;">Preencha os dados básicos para iniciarmos a análise.</p>
  </div>

  <label>Ramo de Atividade</label>
  <select id="fSetor">
    <option>Varejo</option><option>Serviços</option><option>Indústria</option><option>Tecnologia</option>
  </select>

  <label>Faturamento Mensal Estimado (R$)</label>
  <input type="number" id="fFat" placeholder="Ex: 45000">

  <label>Principais Dificuldades Atuais</label>
  <textarea id="fDesafios" rows="4" placeholder="O que hoje impede sua empresa de lucrar mais?"></textarea>

  <button class="btn-submit" onclick="enviar()">CONCLUIR DIAGNÓSTICO</button>
</div>

<div class="box" id="msgSucesso" style="display:none; text-align:center;">
  <h2 style="color: #4CAF82;">✅ Enviado com Sucesso!</h2>
  <p>Roberta e a Artyva agradecem a confiança. Entraremos em contato em breve.</p>
</div>

<script>
const SB_URL = "https://bxqqygsuxvmdtjugesng.supabase.co";
const SB_KEY = "sb_publishable_nxOSdcbaQ6uslLiCTVW5Vg_0-tWI3Xj";
const sb = supabase.createClient(SB_URL, SB_KEY);

const urlParams = new URLSearchParams(window.location.search);
const empresa = urlParams.get('cliente') || "Sua Empresa";
document.getElementById('displayNome').innerText = empresa;

async function enviar() {
  const btn = document.querySelector('.btn-submit');
  btn.innerText = "Enviando dados...";
  btn.disabled = true;

  const { error } = await sb.from('diagnosticos').insert([{
    empresa_nome: empresa,
    setor: document.getElementById('fSetor').value,
    data_envio: new Date().toISOString(),
    valores_kpi: { 
        faturamento: document.getElementById('fFat').value, 
        desafios: document.getElementById('fDesafios').value 
    }
  }]);

  if(!error) {
    document.getElementById('formContent').style.display = 'none';
    document.getElementById('msgSucesso').style.display = 'block';
  } else {
    alert("Erro ao salvar. Verifique sua conexão.");
    btn.innerText = "CONCLUIR DIAGNÓSTICO";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
