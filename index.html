<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artyva — Painel de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --pink: #FF3366; --bg: #111; --card: #1A1A1A; --border: #333; --text: #EEE; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
  .container { max-width: 1100px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  input { background: #222; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
  .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
  .btn-primary { background: var(--pink); color: white; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,51,102,0.3); }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th { text-align: left; color: #666; font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
  td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .link-area { background: #0A192F; border: 1px solid #112240; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1 style="margin:0; font-size: 20px; color: var(--pink);">ARTYVA</h1>
      <p style="margin:0; font-size: 12px; color: #666;">DIAGNÓSTICO ESTRATÉGICO</p>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Gerar Novo Diagnóstico</h3>
    <input type="text" id="clienteNome" placeholder="Nome do Cliente ou Empresa">
    <button class="btn btn-primary" onclick="gerarLink()">GERAR LINK DE ENVIO</button>
    <div id="linkArea" class="link-area">
      <p style="margin:0 0 10px 0; font-size: 12px; color: #888;">Envie este link para o cliente:</p>
      <div id="linkFinal" style="color: #64FFDA; font-family: monospace; word-break: break-all; font-size: 13px;"></div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Empresas Diagnosticadas</h3>
    <table>
      <thead><tr><th>Data</th><th>Empresa / Cliente</th><th>Status</th></tr></thead>
      <tbody id="listaClientes"></tbody>
    </table>
  </div>
</div>

<script>
const SB_URL = "https://bxqqygsuxvmdtjugesng.supabase.co";
const SB_KEY = "sb_publishable_nxOSdcbaQ6uslLiCTVW5Vg_0-tWI3Xj";
const sb = supabase.createClient(SB_URL, SB_KEY);

function gerarLink() {
  const nome = document.getElementById('clienteNome').value;
  if(!nome) return alert("Por favor, digite o nome do cliente.");
  const url = `https://diagostico-artyva-6op684vdd-robertasantosadm-clouds-projects.vercel.app/formulario.html?cliente=${encodeURIComponent(nome)}`;
  document.getElementById('linkFinal').innerText = url;
  document.getElementById('linkArea').style.display = 'block';
}

async function load() {
  const { data, error } = await sb.from('diagnosticos').select('*').order('data_envio', { ascending: false });
  if(data) {
    document.getElementById('listaClientes').innerHTML = data.map(d => `
      <tr>
        <td>${new Date(d.data_envio).toLocaleDateString()}</td>
        <td><strong>${d.empresa_nome}</strong></td>
        <td><span style="background:#132A13; color:#4CAF82; padding:4px 8px; border-radius:4px; font-size:11px;">RECEBIDO</span></td>
      </tr>`).join('');
  }
}
load();
</script>
</body>
</html>
